<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guixu — Agent Trace Viewer</title>
<style>
/* ============================================================
   Light theme (default)
   ============================================================ */
:root {
  --bg: #ffffff; --panel: #ffffff; --panel-alt: #f8f9fa;
  --border: #d0d5dd; --border-light: #e4e7ec;
  --text: #1d2939; --text-dim: #667085;
  --accent: #1570ef; --green: #12b76a; --red: #f04438;
  --yellow: #dc6803; --orange: #ef6820; --purple: #7a5af8; --cyan: #0ba5ec;
  --radius: 4px;
  color-scheme: light;
}

/* ============================================================
   Dark theme — auto (system) or manual
   ============================================================ */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #0a0e17; --panel: #111827; --panel-alt: #1e293b;
    --border: #334155; --border-light: #1e293b;
    --text: #e2e8f0; --text-dim: #94a3b8;
    --accent: #60a5fa; --green: #34d399; --red: #f87171;
    --yellow: #fbbf24; --orange: #fb923c; --purple: #a78bfa; --cyan: #22d3ee;
    color-scheme: dark;
  }
}
[data-theme="dark"] {
  --bg: #0a0e17; --panel: #111827; --panel-alt: #1e293b;
  --border: #334155; --border-light: #1e293b;
  --text: #e2e8f0; --text-dim: #94a3b8;
  --accent: #60a5fa; --green: #34d399; --red: #f87171;
  --yellow: #fbbf24; --orange: #fb923c; --purple: #a78bfa; --cyan: #22d3ee;
  color-scheme: dark;
}

/* ============================================================
   Base
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 13px; line-height: 1.5;
}
.trace-app { display: flex; flex-direction: column; height: 100vh; }

/* Header */
.trace-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-bottom: 2px solid var(--text); background: var(--bg);
  flex-shrink: 0;
}
.logo { font-size: 18px; font-weight: 700; }
.logo a { text-decoration: none; color: var(--text); }
.logo .sub { font-size: 12px; font-weight: 400; color: var(--text-dim); margin-left: 4px; }
.trace-toolbar { display: flex; gap: 6px; align-items: center; }
.trace-toolbar select, .trace-toolbar input {
  padding: 4px 8px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--bg); color: var(--text); font-size: 11px; font-family: inherit;
}
.trace-toolbar select:focus, .trace-toolbar input:focus { outline: none; border-color: var(--accent); }
.btn-primary {
  padding: 4px 14px; background: var(--text); border: none; border-radius: 3px;
  color: var(--bg); font-size: 11px; font-weight: 600; cursor: pointer;
}
.btn-primary:hover { opacity: 0.85; }
.btn-icon {
  width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--bg); color: var(--text); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

/* Main layout */
.trace-main { display: flex; flex: 1; overflow: hidden; }

/* ============================================================
   Trace list panel
   ============================================================ */
.trace-list-panel {
  width: 360px; min-width: 0; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transition: width 0.2s;
}
.trace-list-panel.collapsed { width: 0; border-right: none; }
.trace-list-panel.collapsed .trace-list,
.trace-list-panel.collapsed .trace-list-header { display: none; }
.trace-list-header {
  padding: 8px 12px; border-bottom: 1px solid var(--border-light);
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.trace-list-header .count { font-weight: 400; color: var(--text-dim); }
.trace-list { flex: 1; overflow-y: auto; }
.trace-item {
  padding: 8px 12px; border-bottom: 1px solid var(--border-light);
  cursor: pointer; transition: background 0.1s; font-size: 11px;
}
.trace-item:hover { background: var(--panel-alt); }
.trace-item.active { background: color-mix(in srgb, var(--accent) 8%, var(--bg)); border-left: 3px solid var(--accent); }
.trace-item-id { font-family: monospace; font-size: 10px; color: var(--text-dim); }
.trace-item-name { font-weight: 600; margin: 2px 0; }
.trace-item-meta { display: flex; gap: 8px; color: var(--text-dim); font-size: 10px; flex-wrap: wrap; }
.tag {
  padding: 0 4px; border-radius: 2px; font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.tag-guixu { background: color-mix(in srgb, var(--accent) 12%, var(--bg)); color: var(--accent); }
.tag-openai { background: color-mix(in srgb, var(--purple) 12%, var(--bg)); color: var(--purple); }
.tag-claude { background: color-mix(in srgb, var(--yellow) 12%, var(--bg)); color: var(--yellow); }

/* Detail panel */
.trace-detail-panel { flex: 1; overflow-y: auto; padding: 16px; min-width: 0; }

/* Summary cards */
.trace-summary {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.summary-card {
  border: 1px solid var(--border-light); border-radius: var(--radius); padding: 10px;
  background: var(--panel-alt);
}
.summary-card .label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
.summary-card .value { font-size: 18px; font-weight: 700; margin-top: 2px; font-family: 'SF Mono','Fira Code',monospace; }

/* Tabs */
.trace-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.trace-tab {
  padding: 6px 14px; font-size: 11px; font-weight: 600; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--text-dim); transition: all 0.15s;
}
.trace-tab:hover { color: var(--text); }
.trace-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ============================================================
   Waterfall
   ============================================================ */
.waterfall { position: relative; }
.waterfall-header {
  display: flex; align-items: flex-end; font-size: 10px; font-weight: 600; color: var(--text-dim);
  border-bottom: 1px solid var(--border-light); margin-bottom: 2px;
}
.wf-name-col { width: 220px; flex-shrink: 0; padding: 4px 0; }
.wf-bar-col { flex: 1; position: relative; overflow: hidden; }
.wf-duration-col { width: 56px; text-align: right; padding: 4px 0; flex-shrink: 0; }

/* Time axis */
.wf-axis { position: relative; height: 22px; }
.wf-tick {
  position: absolute; bottom: 2px; transform: translateX(-50%);
  font-size: 9px; color: var(--text-dim); font-family: monospace;
}
.wf-tick::before {
  content: ''; position: absolute; left: 50%; top: 14px;
  width: 0; border-left: 1px dashed var(--border-light);
  height: 2000px; pointer-events: none; opacity: 0.5;
}

/* Rows */
.wf-bar-container { overflow: hidden; transform-origin: 0 0; }
.wf-row {
  display: flex; align-items: center; padding: 2px 0; font-size: 11px;
  border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background 0.1s;
}
.wf-row:hover { background: var(--panel-alt); }
.wf-row.active { background: color-mix(in srgb, var(--accent) 8%, var(--bg)); }
.wf-name {
  width: 220px; flex-shrink: 0; display: flex; align-items: center; gap: 3px;
  overflow: hidden; white-space: nowrap;
}
.wf-label { overflow: hidden; text-overflow: ellipsis; }
.wf-indent { display: inline-block; flex-shrink: 0; }
.wf-toggle {
  width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 8px; cursor: pointer; border-radius: 2px; flex-shrink: 0; color: var(--text-dim);
}
.wf-toggle:hover { background: var(--border-light); color: var(--text); }
.wf-toggle-spacer { width: 14px; flex-shrink: 0; }
.wf-type-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.wf-bar-area { flex: 1; position: relative; height: 16px; min-width: 0; }
.wf-bar {
  position: absolute; height: 12px; top: 2px; border-radius: 2px;
  min-width: 2px; opacity: 0.85; cursor: pointer;
}
.wf-bar:hover { opacity: 1; }
/* Tooltip */
.wf-bar[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute; bottom: calc(100% + 4px); left: 0;
  background: var(--text); color: var(--bg); padding: 3px 8px;
  border-radius: 3px; font-size: 10px; white-space: nowrap; z-index: 10;
  pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.wf-duration { width: 56px; font-size: 10px; color: var(--text-dim); text-align: right; flex-shrink: 0; }
.wf-err { color: var(--red); }
.wf-collapsed-badge {
  font-size: 9px; color: var(--text-dim); background: var(--panel-alt);
  border: 1px solid var(--border-light); border-radius: 2px; padding: 0 3px; margin-left: 2px;
}

/* Span type colors */
.type-agent, .dot-agent { background: var(--accent); }
.type-generation, .dot-generation { background: var(--purple); }
.type-tool_use, .dot-tool_use { background: var(--green); }
.type-guardrail, .dot-guardrail { background: var(--yellow); }
.type-handoff, .dot-handoff { background: var(--cyan); }
.type-memory_mutation, .dot-memory_mutation { background: var(--orange); }
.type-user, .dot-user { background: #94a3b8; }
.type-system, .dot-system { background: #64748b; }
.type-other, .dot-other { background: var(--border); }

/* Legend */
.wf-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border-light); }
.wf-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-dim); }
.wf-zoom-hint { font-size: 9px; color: var(--text-dim); margin-top: 4px; text-align: right; }

/* ============================================================
   Span detail
   ============================================================ */
.span-detail {
  border: 1px solid var(--border-light); border-radius: var(--radius);
  padding: 12px; margin-top: 12px; background: var(--panel-alt);
}
.span-detail h4 { font-size: 12px; margin-bottom: 8px; }
.span-type-label {
  font-weight: 400; color: var(--text-dim); font-size: 10px;
  background: var(--bg); padding: 1px 6px; border-radius: 2px; border: 1px solid var(--border-light);
}
.span-detail-grid { display: grid; gap: 0; }
.span-detail-row {
  display: flex; justify-content: space-between; font-size: 11px;
  padding: 3px 0; border-bottom: 1px solid var(--border-light);
}
.span-detail-row .label { color: var(--text-dim); }
.span-detail-row .val.mono { font-family: monospace; font-size: 10px; }
.span-detail-row .val.err { color: var(--red); }
.span-attrs-label { margin-top: 8px; font-size: 10px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.4px; }
.span-attrs {
  margin-top: 4px; padding: 8px; background: var(--bg); border-radius: 3px;
  font-family: monospace; font-size: 10px; white-space: pre-wrap;
  word-break: break-all; max-height: 200px; overflow-y: auto;
  border: 1px solid var(--border-light);
}

/* ============================================================
   Scores
   ============================================================ */
.score-card {
  border: 1px solid var(--border-light); border-radius: var(--radius);
  padding: 10px; margin-bottom: 6px; background: var(--panel-alt);
}
.score-name { font-weight: 600; font-size: 12px; }
.score-val { font-size: 20px; font-weight: 700; font-family: monospace; }
.score-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ============================================================
   Memory timeline
   ============================================================ */
.mem-key-input { display: flex; gap: 6px; margin-bottom: 12px; }
.mem-key-input input {
  flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 3px;
  background: var(--bg); color: var(--text); font-size: 11px; font-family: inherit;
}
.mem-key-input input:focus { outline: none; border-color: var(--accent); }
.mem-count { font-size: 10px; color: var(--text-dim); margin-bottom: 8px; }
.mem-count code { font-family: monospace; background: var(--panel-alt); padding: 0 4px; border-radius: 2px; }
.mem-event { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 11px; }
.mem-event-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 3px; }
.mem-event-body { min-width: 0; }
.mem-event-time { font-family: monospace; font-size: 10px; color: var(--text-dim); }
.mem-event-kind {
  font-weight: 600; font-size: 10px; text-transform: uppercase;
  padding: 0 4px; border-radius: 2px; background: var(--panel-alt); border: 1px solid var(--border-light);
}
.mem-event-summary { margin-top: 2px; }
.mem-event-key { font-size: 10px; color: var(--text-dim); font-family: monospace; }
.mem-event-ids { font-size: 9px; color: var(--text-dim); }

/* ============================================================
   Loading / Error / Empty states
   ============================================================ */
.skeleton-list { padding: 8px 12px; }
.skeleton-row { padding: 6px 0; }
.skeleton-bar {
  height: 12px; border-radius: 3px; width: 80%;
  background: linear-gradient(90deg, var(--border-light) 25%, var(--panel-alt) 50%, var(--border-light) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 4px;
}
.skeleton-bar.short { width: 50%; height: 10px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.error-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px; gap: 8px; text-align: center;
}
.error-icon { font-size: 24px; }
.error-msg { font-size: 12px; color: var(--red); max-width: 400px; }
.btn-retry { margin-top: 4px; }

.empty-state { padding: 24px; text-align: center; color: var(--text-dim); font-size: 12px; }

.trace-detail-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-dim); font-size: 13px;
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 900px) {
  .trace-list-panel { width: 260px; }
  .wf-name-col, .wf-name { width: 160px; }
}
@media (max-width: 640px) {
  .trace-main { flex-direction: column; }
  .trace-list-panel { width: 100% !important; max-height: 35vh; border-right: none; border-bottom: 1px solid var(--border); }
  .trace-list-panel.collapsed { max-height: 0; overflow: hidden; }
  .trace-detail-panel { padding: 12px; }
  .wf-name-col, .wf-name { width: 120px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="trace-app" id="app">
  <div class="trace-header">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn-icon" data-action="toggle-panel" aria-label="Toggle trace list" title="Toggle panel">☰</button>
      <div class="logo"><a href="/demo">Guixu</a> <span class="sub">Trace Viewer</span></div>
    </div>
    <div class="trace-toolbar">
      <select id="sourceFilter" aria-label="Trace source">
        <option value="guixu">Guixu</option>
        <option value="openai">OpenAI</option>
        <option value="claude">Claude</option>
      </select>
      <input type="number" id="limitInput" value="50" min="1" max="500" style="width:56px" title="Limit" aria-label="Result limit">
      <button class="btn-primary" id="btnRefresh">Refresh</button>
      <button class="btn-icon" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">◑</button>
    </div>
  </div>
  <div class="trace-main">
    <div class="trace-list-panel">
      <div class="trace-list-header">
        <span>Traces</span>
        <span class="count" id="traceCount">0</span>
      </div>
      <div class="trace-list" id="traceList" role="list"></div>
    </div>
    <div class="trace-detail-panel" id="traceDetail">
      <div class="trace-detail-empty">Select a trace to view details</div>
    </div>
  </div>
</div>
<script src="/trace/trace.js"></script>
</body>
</html>
