<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300">
  <defs>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; }
      .title { font-size: 10px; font-weight: bold; }
      .label { font-size: 8.5px; fill: #333; }
      .sublabel { font-size: 7px; fill: #555; }
    </style>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#546E7A"/>
    </marker>
  </defs>

  <!-- Demo Scenario Title -->
  <text x="260" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#222" font-family="Helvetica, Arial, sans-serif">Demo Scenario: Cross-Source Dataset Discovery, Trading &amp; Verification</text>

  <!-- Provider Node (left) -->
  <rect x="10" y="35" width="140" height="120" fill="#E8F5E9" stroke="#2E7D32" rx="5" ry="5" stroke-width="1.2"/>
  <text x="80" y="52" text-anchor="middle" class="title" fill="#2E7D32">Provider Node</text>
  <text x="80" y="66" text-anchor="middle" class="sublabel">(Full Node)</text>
  <rect x="22" y="75" width="116" height="22" fill="#fff" stroke="#81C784" rx="3" ry="3"/>
  <text x="80" y="90" text-anchor="middle" class="sublabel">📁 ~/shared-datasets/</text>
  <rect x="22" y="102" width="116" height="22" fill="#fff" stroke="#81C784" rx="3" ry="3"/>
  <text x="80" y="117" text-anchor="middle" class="sublabel">Auto: CSV→Parquet→DHT</text>
  <rect x="22" y="129" width="116" height="18" fill="#fff" stroke="#81C784" rx="3" ry="3"/>
  <text x="80" y="142" text-anchor="middle" class="sublabel">Seed via BitTorrent v2</text>

  <!-- P2P Network (center) -->
  <rect x="180" y="35" width="160" height="120" fill="#ECEFF1" stroke="#546E7A" rx="5" ry="5" stroke-width="1.2"/>
  <text x="260" y="52" text-anchor="middle" class="title" fill="#37474F">P2P Network</text>
  <!-- DHT circle -->
  <ellipse cx="225" cy="85" rx="30" ry="18" fill="#CFD8DC" stroke="#78909C"/>
  <text x="225" y="89" text-anchor="middle" class="sublabel">Kademlia</text>
  <text x="225" y="99" text-anchor="middle" class="sublabel">DHT</text>
  <!-- GossipSub circle -->
  <ellipse cx="295" cy="85" rx="30" ry="18" fill="#CFD8DC" stroke="#78909C"/>
  <text x="295" y="89" text-anchor="middle" class="sublabel">GossipSub</text>
  <!-- BT swarm -->
  <ellipse cx="260" cy="130" rx="45" ry="16" fill="#CFD8DC" stroke="#78909C"/>
  <text x="260" y="134" text-anchor="middle" class="sublabel">BitTorrent Swarm</text>

  <!-- Agent Node (right) -->
  <rect x="370" y="35" width="140" height="120" fill="#E3F2FD" stroke="#1565C0" rx="5" ry="5" stroke-width="1.2"/>
  <text x="440" y="52" text-anchor="middle" class="title" fill="#1565C0">Agent Node</text>
  <text x="440" y="66" text-anchor="middle" class="sublabel">(Light Node + MCP)</text>
  <rect x="382" y="75" width="116" height="22" fill="#fff" stroke="#90CAF9" rx="3" ry="3"/>
  <text x="440" y="90" text-anchor="middle" class="sublabel">🔍 NL Search + Rank</text>
  <rect x="382" y="102" width="116" height="22" fill="#fff" stroke="#90CAF9" rx="3" ry="3"/>
  <text x="440" y="117" text-anchor="middle" class="sublabel">💰 x402 / ERC-8183 Pay</text>
  <rect x="382" y="129" width="116" height="18" fill="#fff" stroke="#90CAF9" rx="3" ry="3"/>
  <text x="440" y="142" text-anchor="middle" class="sublabel">✅ Merkle Verify</text>

  <!-- Arrows between nodes -->
  <line x1="150" y1="85" x2="193" y2="85" stroke="#546E7A" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="327" y1="85" x2="370" y2="85" stroke="#546E7A" stroke-width="1" marker-end="url(#ar)"/>
  <text x="170" y="80" text-anchor="middle" class="sublabel">publish</text>
  <text x="350" y="80" text-anchor="middle" class="sublabel">search</text>

  <!-- External Sources -->
  <rect x="10" y="180" width="140" height="55" fill="#FFF3E0" stroke="#E65100" rx="5" ry="5" stroke-width="1"/>
  <text x="80" y="197" text-anchor="middle" class="title" fill="#E65100">External Sources</text>
  <text x="80" y="212" text-anchor="middle" class="sublabel">Kaggle API Adapter</text>
  <text x="80" y="224" text-anchor="middle" class="sublabel">HuggingFace API Adapter</text>

  <!-- Blockchain -->
  <rect x="180" y="180" width="160" height="55" fill="#F3E5F5" stroke="#6A1B9A" rx="5" ry="5" stroke-width="1"/>
  <text x="260" y="197" text-anchor="middle" class="title" fill="#6A1B9A">Blockchain (Base L2)</text>
  <text x="260" y="212" text-anchor="middle" class="sublabel">EAS Attestation (Provenance)</text>
  <text x="260" y="224" text-anchor="middle" class="sublabel">ERC-8183 Escrow (Payment)</text>

  <!-- Demo Steps at bottom -->
  <rect x="10" y="252" width="500" height="40" fill="#FAFAFA" stroke="#BDBDBD" rx="5" ry="5" stroke-width="1"/>
  <text x="260" y="268" text-anchor="middle" class="label" font-weight="bold">Live Demo Flow:</text>
  <text x="260" y="282" text-anchor="middle" class="sublabel">① Provider drops CSV → auto-registered  ② Agent searches via NL  ③ Preview (x402 $0.001)  ④ Purchase (ERC-8183)  ⑤ P2P download + verify  ⑥ Feedback</text>

  <!-- Connecting lines -->
  <line x1="80" y1="180" x2="225" y2="155" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="260" y1="155" x2="260" y2="180" stroke="#6A1B9A" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="440" y1="155" x2="340" y2="195" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>
