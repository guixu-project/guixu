services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
      - opencode-cache:/root/.opencode
      - ${HOME}/.opencode/bin/opencode:/usr/local/bin/opencode:ro
    working_dir: /workspace
    network_mode: host
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "3927:3927"

volumes:
  opencode-cache: